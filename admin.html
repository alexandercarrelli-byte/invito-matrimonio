<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferme Matrimonio - Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .admin-header {
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--text-dark) 100%);
            color: var(--white);
            padding: 40px 20px;
            text-align: center;
        }
        .admin-header h1 {
            font-family: var(--font-serif);
            margin-bottom: 10px;
        }
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .stat-card {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow);
            text-align: center;
        }
        .stat-number {
            font-size: 3rem;
            font-weight: 700;
            color: var(--secondary-color);
            font-family: var(--font-serif);
        }
        .stat-label {
            color: var(--text-light);
            margin-top: 10px;
        }
        .rsvps-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .rsvp-item {
            background: var(--white);
            padding: 30px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px var(--shadow);
            border-left: 4px solid var(--gold);
        }
        .rsvp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .rsvp-status {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .status-yes {
            background: #d4edda;
            color: #155724;
        }
        .status-no {
            background: #f8d7da;
            color: #721c24;
        }
        .guest-list {
            margin-top: 20px;
        }
        .guest-item {
            padding: 15px;
            background: var(--accent-color);
            margin-bottom: 10px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: center;
        }
        .guest-name {
            font-weight: 600;
            color: var(--text-dark);
        }
        .guest-allergies {
            color: var(--text-light);
            font-style: italic;
        }
        .no-allergies {
            color: #999;
            font-size: 0.9rem;
        }
        .rsvp-message {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-style: italic;
            color: var(--text-light);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .export-btn {
            background: var(--secondary-color);
            color: var(--white);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin: 20px;
            transition: background 0.3s;
        }
        .export-btn:hover {
            background: var(--text-dark);
        }
        @media (max-width: 768px) {
            .guest-item {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .rsvp-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>Conferme Matrimonio</h1>
        <p>Anna & Massimo - 26 Agosto 2026</p>
        <a href="index.html" style="color: var(--white); text-decoration: underline; margin-top: 20px; display: inline-block;">← Torna al sito</a>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-number" id="totalRSVPs">0</div>
            <div class="stat-label">Totale Risposte</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="totalYes">0</div>
            <div class="stat-label">Conferme</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="totalNo">0</div>
            <div class="stat-label">Dispiace</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="totalGuests">0</div>
            <div class="stat-label">Totale Ospiti</div>
        </div>
    </div>

    <div style="text-align: center;">
        <button class="export-btn" onclick="exportToCSV()">Esporta in CSV</button>
        <button class="export-btn" onclick="clearAllData()" style="background: #dc3545;">Cancella Tutti i Dati</button>
    </div>

    <div class="rsvps-container" id="rsvpsContainer">
        <!-- Le conferme verranno caricate qui dinamicamente -->
    </div>

    <script src="admin.js"></script>
</body>
</html>
